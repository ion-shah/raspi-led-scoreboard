# ============================================================
# LED Scoreboard config.yaml
# ============================================================

# ------------------------------------------------------------
# Hardware Settings
# ------------------------------------------------------------
hardware:
  rows: 32                         # LED panel row count (32 or 64)
  cols: 64                         # LED panel column count (64 typical)
  chained: 2                       # Number of panels chained together
  gpio_mapping: "adafruit-hat-pwm" # regular adafruit-hat or adafruit-hat-pwm (if GPIO mod done)
  gpio_slowdown: 4                 # Increase if display looks garbled (0-4)
  pwm_lsb_nanoseconds: 300         # Increase on low powered hardware; Changes the time for the least significant bit to send
  brightness: 70                   # 0-100, overall brightness
  pwm_bits: 7                      # 1-11, color depth (lower = faster refresh)
  rgb_mapping: "GBR"               # Change if colors seem very off; Certain LED Panels have different RGB mapping
  show_refresh_rate: 0             # 1 to show refresh rate


# ------------------------------------------------------------
# Display Settings
# ------------------------------------------------------------
display:
  timezone: "America/New_York"    # Timezone for displaying game times
                                  # Full list: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
  scene_duration: 15              # Seconds each game is shown before rotating
  transition: slide               # slide | fade | cut
  brightness_schedule:
    enabled: true
    day_brightness: 70            # Brightness during daytime hours
    night_brightness: 20          # Brightness at night
    day_start: "09:00"            # Time to switch to day brightness
    night_start: "21:00"          # Time to switch to night brightness


# ------------------------------------------------------------
# Game Filtering
# ------------------------------------------------------------
scheduling:
  pregame_lookahead_minutes: 1000   # Show pregame this many minutes before game start
  postgame_lookback_minutes: 60   # Keep showing final score this many minutes after game ends


# ------------------------------------------------------------
# Sports & Favorite Teams
# ------------------------------------------------------------
# When a sport is not enabled it will be processed at all
sports:
  nba:
    enabled: false
    favorites:
      - NY
      - LAC

  nfl:
    enabled: false
    favorites:
      - NYJ

  mlb:
    enabled: false
    favorites:
      - NYY

  nhl:
    enabled: false
    favorites: 
      - NYI

  college-football:
    enabled: false
    favorites:
      - GT

  college-basketball:
    enabled: false
    favorites: 
      - GT
  
  college-baseball:
    enabled: false
    favorites:
      - GT

  fifa.world:
    enabled: true
    favorites:
      - USA

# ------------------------------------------------------------
# Importance & Display Priority
# ------------------------------------------------------------
priority:
  pin_threshold: 140        # Games at or above this score pause rotation and display statically
  favorite_leagues:
    - nba 

# ------------------------------------------------------------
# Logo Overrides
# ------------------------------------------------------------
logo_overrides: # Use retro logos instead of current logos
  nba:
    UTAH: "2004"
    TOR:  "1995"
    DET:  "1996"
    BKN:  "2003"
    CLE:  "2016"
    MEM:  "2001"
  nfl: {}
  mlb: {}
  nhl: {}